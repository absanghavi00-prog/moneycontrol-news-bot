name: Moneycontrol Stocks Scraper

on:

  schedule:
    - cron: '*/5 * * * *'

  workflow_dispatch:

jobs:

  scrape:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout

        uses: actions/checkout@v4

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.11"

      - name: Install dependencies

        run: |

          pip install -r requirements.txt

      - name: Run scraper

        run: |

          python scraper.py

      - name: Commit updated seen.csv

        run: |

          git config user.name github-actions

          git config user.email actions@github.com

          git add seen.csv

          git diff --cached --quiet || git commit -m "Update seen"

          git push
